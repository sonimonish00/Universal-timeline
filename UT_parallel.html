<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Universal Timeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #0a0a0f;
      --s: #111119;
      --s2: #181824;
      --b: #1e1e2e;
      --t: #e0e0e6;
      --d: #6b6b80;
      --sc: #42a5f5;
      --tc: #7c6aef;
      --po: #ff6b9d;
      --cu: #ffa726;
      --in: #66bb6a;
      --bi: #4ecdc4;
      --ai: #ab47bc;
      --en: #ef5350
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--t);
      line-height: 1.5
    }

    .hd {
      text-align: center;
      padding: 50px 20px 20px
    }

    .hd h1 {
      font-size: clamp(1.5rem, 4vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #7c6aef, #4ecdc4, #ff6b9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .hd p {
      color: var(--d);
      font-size: .8rem;
      margin-top: 6px
    }

    .sb {
      max-width: 420px;
      margin: 10px auto;
      display: block;
      padding: 9px 16px;
      border-radius: 24px;
      border: 1px solid var(--b);
      background: var(--s);
      color: var(--t);
      font-size: .82rem;
      width: calc(100% - 40px);
      font-family: inherit;
      outline: none
    }

    .sb:focus {
      border-color: var(--tc);
      box-shadow: 0 0 16px #7c6aef22
    }

    .legend {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px 20px 20px
    }

    .lg {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: .65rem;
      color: var(--d)
    }

    .lg span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block
    }

    .era {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 16px
    }

    .era-t {
      font-size: .95rem;
      font-weight: 700;
      color: var(--tc);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 30px 0 8px;
      border-bottom: 1px solid var(--b);
      margin-bottom: 2px
    }

    .row {
      display: grid;
      grid-template-columns: 100px 1fr;
      border-bottom: 1px solid #141420;
      transition: .2s;
      cursor: pointer
    }

    .row:hover {
      background: var(--s)
    }

    .row.open {
      background: var(--s)
    }

    .yr {
      padding: 10px 8px;
      font-size: .7rem;
      font-weight: 600;
      color: var(--d);
      white-space: nowrap;
      border-right: 1px solid #141420
    }

    .cells {
      padding: 8px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: flex-start
    }

    .chip {
      font-size: .68rem;
      padding: 3px 8px;
      border-radius: 10px;
      border: 1px solid;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      line-height: 1.3;
      transition: .2s
    }

    .chip .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .chip.sc {
      border-color: #42a5f533;
      color: #42a5f5
    }

    .chip.sc .dot {
      background: #42a5f5
    }

    .chip.tc {
      border-color: #7c6aef33;
      color: #b0a4f0
    }

    .chip.tc .dot {
      background: #7c6aef
    }

    .chip.po {
      border-color: #ff6b9d33;
      color: #ff6b9d
    }

    .chip.po .dot {
      background: #ff6b9d
    }

    .chip.cu {
      border-color: #ffa72633;
      color: #ffa726
    }

    .chip.cu .dot {
      background: #ffa726
    }

    .chip.in {
      border-color: #66bb6a33;
      color: #66bb6a
    }

    .chip.in .dot {
      background: #66bb6a
    }

    .chip.bi {
      border-color: #4ecdc433;
      color: #4ecdc4
    }

    .chip.bi .dot {
      background: #4ecdc4
    }

    .chip.ai {
      border-color: #ab47bc33;
      color: #ce93d8
    }

    .chip.ai .dot {
      background: #ab47bc
    }

    .chip.en {
      border-color: #ef535033;
      color: #ef5350
    }

    .chip.en .dot {
      background: #ef5350
    }

    .detail {
      display: none;
      grid-column: 1/-1;
      padding: 6px 10px 10px 110px;
      font-size: .72rem;
      color: var(--d);
      line-height: 1.6;
      background: var(--s2);
      border-bottom: 1px solid #141420
    }

    .row.open+.detail {
      display: block
    }

    .detail b {
      color: var(--t);
      font-weight: 600
    }

    .hidden {
      display: none
    }

    footer {
      text-align: center;
      padding: 30px;
      color: var(--d);
      font-size: .65rem;
      border-top: 1px solid var(--b);
      margin-top: 40px
    }

    @media(max-width:600px) {
      .row {
        grid-template-columns: 72px 1fr
      }

      .detail {
        padding-left: 80px
      }

      .cells {
        gap: 3px
      }
    }
  </style>
</head>

    function render() {

          wrap.appendChild(r); wrap.appendChild(detail);
        });
        app.appendChild(wrap);
      });

      document.querySelectorAll(".row").forEach(r => {
        const d = r.nextElementSibling;
        const show = !q || r.textContent.toLowerCase().includes(q) || (d && d.textContent.toLowerCase().includes(q));
        r.classList.toggle("hidden", !show);
        if (d && d.classList.contains("detail")) d.style.display = show && r.classList.contains("open") ? "block" : "none";
        if (!show) r.classList.remove("open");
      });
    });
    render();
  </script>
</body>

</html>
